site_name: Teleproxy
site_url: https://teleproxy.github.io
site_description: High-performance MTProto proxy for Telegram with DPI resistance, fake-TLS camouflage, and production-grade monitoring
repo_url: https://github.com/teleproxy/teleproxy
repo_name: teleproxy/teleproxy

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.svg
  favicon: assets/favicon.png
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/extra.css

plugins:
  - search
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ru
          name: Русский
          build: true
          nav_translations:
            Home: Главная
            Comparison: Сравнение
            Getting Started: Начало работы
            Installation: Установка
            Quick Start: Быстрый старт
            Docker: Docker
            Configuration: Конфигурация
            Monitoring: Мониторинг
            Features: Возможности
            "Fake-TLS (EE Mode)": "Fake-TLS (режим EE)"
            Direct-to-DC Mode: Прямое подключение к DC
            IP Access Control: Контроль доступа по IP
            "Secrets & Limits": "Секреты и лимиты"
            Diagnostics: Диагностика
            Deployment: Развёртывание
            Systemd: Systemd
            IPv6: IPv6
            Testing: Тестирование
            Changelog: Журнал изменений
        - locale: fa
          name: فارسی
          build: true
          nav_translations:
            Home: خانه
            Comparison: مقایسه
            Getting Started: شروع کار
            Installation: نصب
            Quick Start: شروع سریع
            Docker: Docker
            Configuration: پیکربندی
            Monitoring: مانیتورینگ
            Features: ویژگی‌ها
            "Fake-TLS (EE Mode)": "Fake-TLS (حالت EE)"
            Direct-to-DC Mode: اتصال مستقیم به DC
            IP Access Control: کنترل دسترسی IP
            "Secrets & Limits": "رمزها و محدودیت‌ها"
            Diagnostics: تشخیص
            Deployment: استقرار
            Systemd: Systemd
            IPv6: IPv6
            Testing: تست
            Changelog: تاریخچه تغییرات
        - locale: vi
          name: Tiếng Việt
          build: true
          nav_translations:
            Home: Trang chủ
            Comparison: So sánh
            Getting Started: Bắt đầu
            Installation: Cài đặt
            Quick Start: Khởi động nhanh
            Docker: Docker
            Configuration: Cấu hình
            Monitoring: Giám sát
            Features: Tính năng
            "Fake-TLS (EE Mode)": "Fake-TLS (Chế độ EE)"
            Direct-to-DC Mode: Kết nối trực tiếp đến DC
            IP Access Control: Kiểm soát truy cập IP
            "Secrets & Limits": "Bí mật & Giới hạn"
            Diagnostics: Chẩn đoán
            Deployment: Triển khai
            Systemd: Systemd
            IPv6: IPv6
            Testing: Kiểm thử
            Changelog: Nhật ký thay đổi

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Comparison: comparison.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Docker:
    - Quick Start: docker/index.md
    - Configuration: docker/configuration.md
    - Monitoring: docker/monitoring.md
  - Features:
    - Fake-TLS (EE Mode): features/fake-tls.md
    - Direct-to-DC Mode: features/direct-mode.md
    - IP Access Control: features/access-control.md
    - Secrets & Limits: features/secrets.md
    - Monitoring: features/monitoring.md
    - Diagnostics: features/diagnostics.md
  - Deployment:
    - Systemd: deployment/systemd.md
    - IPv6: deployment/ipv6.md
  - Testing: testing.md
  - Changelog: changelog.md
