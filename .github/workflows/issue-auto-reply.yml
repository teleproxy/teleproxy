name: Issue Auto-Reply

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-reply:
    if: >-
      github.event.issue.user.type != 'Bot' &&
      github.event.issue.user.login != 'rkline0x'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Thanks for opening an issue! A maintainer will review it soon.\n\nFor project updates, join [@teleproxy_dev](https://t.me/teleproxy_dev) on Telegram.\n\nIssues without community interest may be closed after 60 days of inactivity.`
            });
