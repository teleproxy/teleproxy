name: Build and Push Docker Image

on:
  push:
    branches: [ '*' ]  # Build on every branch
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_IMAGE: rkline0x/teleproxy

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request' && env.HAS_DOCKERHUB == 'true'
      env:
        HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' }}
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      env:
        HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          ${{ env.HAS_DOCKERHUB == 'true' && env.DOCKERHUB_IMAGE || '' }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      id: build  # Added missing step ID
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        annotations: ${{ steps.meta.outputs.annotations }}
        provenance: false
        sbom: false
        build-args: |
          VERSION=${{ steps.meta.outputs.version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Clean up attestation artifacts
      if: github.event_name != 'pull_request'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Delete versions tagged only with sha256-* (old attestation/provenance
        # artifacts). Do NOT delete untagged versions — those are the platform
        # manifests (amd64/arm64) referenced by the multi-arch index.
        gh api --paginate \
          /orgs/teleproxy/packages/container/teleproxy/versions \
          --jq '.[] | select(
            (.metadata.container.tags | length > 0) and
            (.metadata.container.tags | all(startswith("sha256-")))
          ) | .id' | while read -r id; do
          echo "Deleting attestation version $id"
          gh api --method DELETE \
            "/orgs/teleproxy/packages/container/teleproxy/versions/$id" || true
        done
