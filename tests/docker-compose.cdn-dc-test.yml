services:
  teleproxy:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        DEBUG_TOOLS: "1"
    ports:
      - "18443:8443"
      - "18888:8888"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - SECRET=${TELEPROXY_SECRET}
      - PORT=8443
      - WORKERS=0
      - DIRECT_MODE=true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/stats || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
  tester:
    build: .
    environment:
      - TELEPROXY_HOST=teleproxy
      - TELEPROXY_PORT=8443
      - TELEPROXY_STATS_PORT=8888
      - TELEPROXY_SECRET=${TELEPROXY_SECRET}
    depends_on:
      teleproxy:
        condition: service_healthy
    command: ["python", "test_cdn_dc.py"]
